<div id="pluginWrapper">
  <div id="variableCollectionDiv"></div>
</div>
<script>

  const variableCollectionDiv = document.getElementById('variableCollectionDiv')

  function createPaletteRow(collectionId, palette) {
    let paletteRow = document.createElement('div')
    paletteRow.className = 'palette-row'
    paletteRow.id = palette.path

    let paletteNameP = document.createElement('p')
    paletteNameP.className = 'palette-name'
    paletteNameP.textContent = palette.name
    paletteRow.appendChild(paletteNameP)

    let createPaletteButton = document.createElement('button')
    createPaletteButton.className = 'secondary-button'
    createPaletteButton.textContent = 'Create palette'
    createPaletteButton.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'create-palette', collectionId: collectionId, palettePath: palette.path } }, '*')
    })
    paletteRow.appendChild(createPaletteButton)

    return paletteRow
  }

  function renderGroupNode(collectionId, group) {
    let groupSection = document.createElement('details')
    groupSection.className = 'group-section'
    groupSection.open = false

    let groupSummary = document.createElement('summary')

    let summaryContentWrapper = document.createElement('div')
    summaryContentWrapper.classList.add('summary-content-wrapper')

    let groupTitle = document.createElement('h3')
    summaryContentWrapper.appendChild(groupTitle)
    groupTitle.className = 'group-title'
    groupTitle.textContent = group.name
   

    let createGroupButton = document.createElement('button')
    summaryContentWrapper.appendChild(createGroupButton)
    createGroupButton.className = 'secondary-button group-create-all-button'
    createGroupButton.textContent = 'Create palettes for whole group'
    createGroupButton.addEventListener('click', (event) => {
      event.preventDefault()
      event.stopPropagation()
      parent.postMessage({
        pluginMessage: {
          type: 'create-group-palettes',
          collectionId: collectionId,
          groupPath: group.path
        }
      }, '*')
    })
    groupSummary.appendChild(summaryContentWrapper)

    groupSection.appendChild(groupSummary)

    let groupBody = document.createElement('div')
    groupBody.className = 'group-body'

    Object.values(group.palettes || {}).forEach(palette => {
      groupBody.appendChild(createPaletteRow(collectionId, palette))
    })

    Object.values(group.groups || {}).forEach(childGroup => {
      groupBody.appendChild(renderGroupNode(collectionId, childGroup))
    })

    groupSection.appendChild(groupBody)
    return groupSection
  }

  function renderCollectionNode(collection) {
    let collectionSection = document.createElement('details')
    collectionSection.className = 'collection-section'
    collectionSection.open = true

    let collectionSummary = document.createElement('summary')
    collectionSummary.className = 'collection-summary'

    let collectionTitle = document.createElement('h2')
    collectionTitle.className = 'collection-title'
    collectionTitle.textContent = collection.name
    collectionSummary.appendChild(collectionTitle)
    collectionSection.appendChild(collectionSummary)

    let collectionBody = document.createElement('div')
    collectionBody.className = 'collection-body'

    const hierarchyRoot = collection.hierarchy || {}

    Object.values(hierarchyRoot.groups || {}).forEach(group => {
      collectionBody.appendChild(renderGroupNode(collection.id, group))
    })

    Object.values(hierarchyRoot.palettes || {}).forEach(palette => {
      collectionBody.appendChild(createPaletteRow(collection.id, palette))
    })

    collectionSection.appendChild(collectionBody)
    return collectionSection
  }

  onmessage = (event) => {
    let pluginMessage = event.data.pluginMessage
    let collectionHierarchies = pluginMessage.collectionHierarchies

    variableCollectionDiv.innerHTML = ''

    if (!collectionHierarchies) return

    collectionHierarchies.forEach(collection => {
      variableCollectionDiv.appendChild(renderCollectionNode(collection))
    })
  }

   

</script>
