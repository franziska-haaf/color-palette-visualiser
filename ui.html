<div id="pluginWrapper">
  <h2>Local variable collections</h2>
  <div>
    <h3>Name</h3>
    <div id="colorPaletteDiv">

    </div>
  </div>
</div>
<script>

  const colorPaletteDiv = document.getElementById('colorPaletteDiv')

  function createPaletteRow(palette) {
    let singlePaletteDiv = document.createElement('div')
    singlePaletteDiv.id = palette.path

    let paletteNameP = document.createElement('p')
    paletteNameP.textContent = palette.path
    singlePaletteDiv.appendChild(paletteNameP)

    let createPaletteButton = document.createElement('button')
    createPaletteButton.className = "secondary-button"
    createPaletteButton.textContent = "Create color palette"
    createPaletteButton.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'create-palette', palettePath: palette.path } }, '*')
    })
    singlePaletteDiv.appendChild(createPaletteButton)

    return singlePaletteDiv
  }

  function renderHierarchyGroup(group) {
    if (!group) return

    Object.values(group.palettes || {}).forEach(palette => {
      colorPaletteDiv.appendChild(createPaletteRow(palette))
    })

    Object.values(group.groups || {}).forEach(childGroup => {
      renderHierarchyGroup(childGroup)
    })
  }

  onmessage = (event) => {
    let pluginMessage = event.data.pluginMessage
    let hierarchyRoot = pluginMessage.colorVariableHierarchy

    colorPaletteDiv.innerHTML = ''
    renderHierarchyGroup(hierarchyRoot)
  }

   

</script>
